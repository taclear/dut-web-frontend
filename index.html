<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👩‍⚕️ Du-T 병동 간호사 스케줄러</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f0f4f8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 500px; 
            width: 90%; 
        }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 10px;}
        p { color: #7f8c8d; margin-bottom: 30px; line-height: 1.5; }
        
        /* ✨ 드래그 앤 드롭 박스 디자인 */
        .upload-box { 
            border: 2px dashed #bdc3c7; 
            padding: 40px 20px; 
            border-radius: 10px; 
            background: #fafafa; 
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        /* 마우스를 올리거나 파일을 끌고 왔을 때 변하는 색상 */
        .upload-box:hover, .upload-box.dragover {
            border-color: #3498db;
            background-color: #ebf5fb;
        }
        
        input[type="file"] { display: none; /* 못생긴 기본 파일버튼 숨기기 */ }
        
        #fileName {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #2980b9;
        }

        button { 
            background: #3498db; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #2980b9; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        
        #loading { 
            display: none; 
            margin-top: 20px; 
            color: #e67e22; 
            font-weight: bold; 
            animation: blink 1.5s infinite;
        }
        #result-message { margin-top: 20px; font-weight: bold; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <h1>👩‍⚕️ 병동 간호사 스마트 스케줄러</h1>
    <p>수간호사 선생님의 스트레스를 0으로!<br>작성된 엑셀 파일을 올리면 AI가 최적의 듀티를 짭니다.</p>

    <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
        📂 <b>이곳을 클릭하거나<br>엑셀 파일을 끌어다 놓으세요 (.xlsx)</b>
        <input type="file" id="fileInput" accept=".xlsx">
        <span id="fileName"></span>
    </div>

    <button id="submitBtn" onclick="calculateDuty()">🚀 AI 근무표 생성 시작</button>
    
    <div id="loading">⏳ 듀티가 수백만 개의 경우의 수를 계산 중입니다...<br>(최대 5분 소요, 창을 닫지 마세요)</div>
    <div id="result-message"></div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');

    // ✨ 파일을 끌고 영역에 들어왔을 때
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    // ✨ 파일을 끌고 영역 밖으로 나갔을 때
    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
    });

    // ✨ 파일을 영역에 마우스에서 손을 떼어 놓았을 때 (Drop)
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        
        if (e.dataTransfer.files.length > 0) {
            fileInput.files = e.dataTransfer.files;
            fileNameDisplay.innerHTML = "✅ 선택된 파일:<br>" + fileInput.files[0].name;
        }
    });

    // ✨ 클릭해서 파일을 선택했을 때
    fileInput.addEventListener('change', () => {
        if(fileInput.files.length > 0) {
            fileNameDisplay.innerHTML = "✅ 선택된 파일:<br>" + fileInput.files[0].name;
        }
    });

    async function calculateDuty() {
        const resultDiv = document.getElementById('result-message');
        const loadingDiv = document.getElementById('loading');
        const submitBtn = document.getElementById('submitBtn');

        if (fileInput.files.length === 0) {
            alert('🚨 먼저 엑셀 파일을 끌어다 놓거나 선택해 주세요!');
            return;
        }

        const file = fileInput.files[0];
        const formData = new FormData();
        formData.append('file', file);

        // 로딩 시작
        loadingDiv.style.display = 'block';
        resultDiv.innerHTML = '';
        submitBtn.disabled = true;

        try {
            // ⭐ 반드시 선생님의 구글 Cloud Run 주소로 바꿔주세요! (끝에 /calculate/ 유지)
            const apiUrl = "https://선생님의-구글-클라우드-주소.a.run.app/calculate/"; 

            const response = await fetch(apiUrl, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = '완성된_Du-T_근무표.xlsx';
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                resultDiv.style.color = "green";
                resultDiv.innerHTML = "✅ 성공! 근무표가 다운로드되었습니다. 🎉";
            } else {
                const errorData = await response.json();
                resultDiv.style.color = "red";
                resultDiv.innerHTML = "🚨 에러 발생: " + errorData.error;
            }
        } catch (error) {
            resultDiv.style.color = "red";
            resultDiv.innerHTML = "🚨 서버와 연결할 수 없습니다. 다시 시도해주세요.";
            console.error(error);
        } finally {
            loadingDiv.style.display = 'none';
            submitBtn.disabled = false;
        }
    }
</script>

</body>
</html>
